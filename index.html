<head>

<style>
:root{--bg:#f6f7f9;--panel:#fff;--ink:#111827;--muted:#667085;--line:#e5e7eb;--dark:#24272b;--dark2:#2f3338;--brand:#ef4444;--ok:#16a34a;--blue:#2563eb;--shadow:0 10px 30px rgba(16,24,40,.08);--radius:14px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;overflow:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;background:none;color:inherit}.app{display:grid;grid-template-columns:220px 1fr;height:100vh}.sidebar{background:#2b3035;color:#fff;padding:14px 10px;display:flex;flex-direction:column;gap:14px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px}.create{background:var(--brand);border-radius:999px;padding:10px 16px;font-weight:800;color:#fff;box-shadow:0 8px 18px rgba(239,68,68,.25);transition:.2s}.create:hover{transform:translateY(-1px)}.nav{display:flex;flex-direction:column;gap:6px}.nav button{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;text-align:left;color:#fff}.nav button.active,.nav button:hover{background:#454a52}.nav small{color:#bcc3cf;margin:12px 10px 4px}.project-chip{background:#56606b;border-radius:9px;padding:10px 12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.main{display:flex;flex-direction:column;min-width:0}.top{height:54px;background:#232529;color:#fff;display:flex;align-items:center;gap:16px;padding:0 18px}.search{max-width:520px;flex:1;margin:auto;background:#4a4e54;border-radius:999px;color:#fff;padding:9px 16px;border:0;outline:none}.status{font-size:12px;color:#cbd5e1}.status.ok{color:#86efac}.status.err{color:#fca5a5}.profile{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#111827;border:1px solid #6b7280;font-weight:800}.project-head{height:78px;background:#fff;border-bottom:1px solid var(--line);padding:14px 24px}.project-title{display:flex;align-items:center;gap:10px;font-weight:900;font-size:22px}.tabs{display:flex;gap:25px;margin-top:14px}.tabs button{padding-bottom:8px;color:#475467}.tabs button.active{color:#111827;border-bottom:2px solid #111827;font-weight:800}.content{flex:1;overflow:auto;padding:24px}.grid{display:grid;gap:18px}.cards{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px}.metric{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}.metric b{display:block;font-size:28px;margin-top:8px}.progress{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress i{display:block;height:100%;background:#111827;border-radius:999px;transition:width .5s ease}.dashboard{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}.panel-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}.countdown{font-size:34px;font-weight:900;line-height:1.15}.board-wrap{overflow:auto;height:calc(100vh - 178px);padding-bottom:20px}.board{display:flex;gap:16px;align-items:flex-start;min-width:max-content}.column{width:290px;background:#eef0f3;border-radius:10px;padding:10px;min-height:350px;transition:.25s}.column.dragover{background:#dbeafe;transform:scale(1.015)}.col-head{display:flex;justify-content:space-between;align-items:center;padding:7px 6px 12px;font-weight:900}.task{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;min-height:90px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease}.task:hover{box-shadow:0 12px 26px rgba(16,24,40,.12);transform:translateY(-2px)}.task.dragging{opacity:.55;transform:rotate(2deg) scale(1.03)}.task.arrive{animation:arrive .35s ease}.task.done{opacity:.72;background:#f9fafb}.task .bar{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:10px 0 0 10px;background:#facc15}.bar.Baja{background:#22c55e}.bar.Media{background:#facc15}.bar.Alta{background:#fb923c}.bar.Urgente{background:#ef4444}.task-title{font-weight:800;margin-left:4px}.task-meta{display:flex;align-items:center;gap:8px;margin-top:14px;color:#667085;font-size:12px}.avatar{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:900}.add-task{padding:9px;color:#475467}.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}.member{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}.member-head{display:flex;gap:12px;align-items:center}.member-list{margin-top:14px;border-top:1px solid var(--line);padding-top:8px}.row-task{padding:9px;border-bottom:1px solid #eef0f3;cursor:pointer}.row-task:hover{background:#f6f8fb}.drawer-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.18);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.22s;z-index:20}.drawer-backdrop.open{opacity:1;pointer-events:auto}.drawer{position:fixed;right:0;top:0;height:100vh;width:min(590px,96vw);background:#fff;box-shadow:-20px 0 40px rgba(16,24,40,.16);transform:translateX(105%);transition:transform .28s cubic-bezier(.2,.8,.2,1);z-index:21;display:flex;flex-direction:column}.drawer.open{transform:translateX(0)}.drawer-head{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 18px}.drawer-body{padding:20px;overflow:auto;flex:1}.close{margin-left:auto;font-size:24px}.field{margin-bottom:15px}.field label{display:block;font-size:12px;font-weight:800;color:#667085;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;background:#fff;outline:none}.field textarea{min-height:95px;resize:vertical}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.subhead{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);padding-top:17px;margin-top:18px;font-weight:900}.subitem{display:grid;grid-template-columns:28px 1fr 120px 120px 30px;gap:8px;align-items:center;padding:8px;border-bottom:1px solid #eef0f3;animation:fadeUp .25s ease}.check{width:18px;height:18px;border:1px solid #98a2b3;border-radius:50%;display:grid;place-items:center}.check.done{background:#16a34a;color:white;border-color:#16a34a}.subitem.done input{text-decoration:line-through;color:#667085}.comment{padding:11px 0;border-bottom:1px solid #eef0f3;animation:fadeUp .25s}.comment b{font-size:13px}.comment small{color:#667085;margin-left:8px}.toast{position:fixed;right:22px;bottom:22px;background:#111827;color:#fff;padding:12px 16px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:.25s;z-index:50}.toast.show{opacity:1;transform:translateY(0)}.loader{position:fixed;inset:0;background:#111827;color:#fff;display:grid;place-items:center;z-index:100;transition:.5s}.loader.hide{opacity:0;pointer-events:none}.loadbox{text-align:center;width:360px;max-width:90vw}.load-logo{font-size:48px;animation:pulse 1.2s infinite}.load-line{height:10px;background:#374151;border-radius:999px;overflow:hidden;margin:18px 0}.load-line i{display:block;height:100%;background:#ef4444;width:0%;animation:loading 1.4s forwards}.empty{color:#667085;text-align:center;padding:26px;border:1px dashed #cbd5e1;border-radius:12px;background:#fff}.hidden{display:none!important}@keyframes loading{to{width:100%}}@keyframes pulse{50%{transform:scale(1.12)}}@keyframes arrive{0%{opacity:0;transform:translateY(-18px) scale(.96)}60%{transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@media(max-width:800px){.app{grid-template-columns:1fr}.sidebar{display:none}.dashboard{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.project-head{height:auto}.tabs{overflow:auto}.content{padding:14px}.subitem{grid-template-columns:28px 1fr}.subitem select,.subitem input[type=date],.subitem button{grid-column:2}.top{padding:0 10px}.search{max-width:none}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loadbox"><div class="load-logo">🎄</div><h1>Navidad Parque Field</h1><p id="loadText">Conectando con Supabase...</p><div class="load-line"><i></i></div><small>Inicializando tareas, equipo y tablero</small></div></div>
<div class="app">
  <aside class="sidebar">
    <div class="brand">🎄 Navidad Parque Field</div>
    <button class="create" onclick="openNewTask()">+ Crear</button>
    <nav class="nav">
      <button data-view="inicio" class="active">🏠 Inicio</button>
      <button data-view="bandeja">📥 Bandeja</button>
      <button data-view="mis">✅ Mis tareas</button>
      <button data-view="equipo">👥 Equipo</button>
      <button data-view="tablero">📋 Tablero</button>
      <button data-view="calendario">📅 Calendario</button>
      <button data-view="config">⚙️ Configuración</button>
      <small>Proyecto activo</small>
      <div class="project-chip">🎄 Navidad Parque Field</div>
    </nav>
  </aside>
  <main class="main">
    <div class="top"><b>Navidad Parque Field</b><input id="search" class="search" placeholder="Buscar tareas, comentarios, etiquetas..." oninput="renderAll()"><span id="conn" class="status">Conectando...</span><span class="profile">ML</span></div>
    <header class="project-head"><div class="project-title">🎄 Navidad Parque Field <span style="font-size:12px;color:#667085">Gestión integral del proyecto</span></div><div class="tabs"><button data-view="inicio" class="active">Inicio</button><button data-view="tablero">Tablero</button><button data-view="equipo">Equipo</button><button data-view="calendario">Calendario</button><button data-view="config">Configuración</button></div></header>
    <section class="content" id="content"></section>
  </main>
</div>
<div class="drawer-backdrop" id="backdrop" onclick="closeDrawer()"></div><aside class="drawer" id="drawer"><div class="drawer-head"><span id="drawerIcon">○</span><input id="taskTitle" style="border:0;font-weight:900;font-size:17px;outline:none;flex:1"><button class="close" onclick="closeDrawer()">×</button></div><div class="drawer-body" id="drawerBody"></div></aside>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://vwbltvormpknlpsdivud.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3Ymx0dm9ybXBrbmxwc2RpdnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4Mzg5NTksImV4cCI6MjA5ODQxNDk1OX0.FT7H7U1-6IShCBfOFp5J6om_wnSCcDNPHp5q_aDqCb8';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const state={view:'inicio',project:null,columns:[],profiles:[],tasks:[],subtasks:[],comments:[],attachments:[],activity:[],selected:null,currentUserName:'Matías'};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function uid(){return crypto.randomUUID()}
function profile(id){return state.profiles.find(p=>p.id===id)}
function doneCol(){return state.columns.find(c=>c.is_done)||state.columns.at(-1)}
function currentUser(){return state.profiles.find(p=>p.full_name.toLowerCase().includes(state.currentUserName.toLowerCase()))||state.profiles[0]}
async function init(){try{await loadData();$('#conn').textContent='Conectado';$('#conn').className='status ok';subscribeRealtime();}catch(e){console.error(e);$('#conn').textContent='Error de conexión';$('#conn').className='status err';toast('No se pudo conectar con Supabase');}finally{renderAll();setTimeout(()=>$('#loader').classList.add('hide'),900)}}
async function loadData(){const {data:proj,error:pe}=await sb.from('projects').select('*').eq('name','Navidad Parque Field').limit(1).single(); if(pe) throw pe; state.project=proj;
 const [cols,prof,tasks,subs,com,att,act]=await Promise.all([
  sb.from('board_columns').select('*').eq('project_id',proj.id).order('position'),
  sb.from('profiles').select('*').order('full_name'),
  sb.from('tasks').select('*').eq('project_id',proj.id).order('position'),
  sb.from('subtasks').select('*').order('position'),
  sb.from('comments').select('*').order('created_at',{ascending:false}),
  sb.from('attachments').select('*').order('created_at',{ascending:false}),
  sb.from('activity_log').select('*').eq('project_id',proj.id).order('created_at',{ascending:false}).limit(50)
 ]); [cols,prof,tasks,subs,com,att,act].forEach(r=>{if(r.error) throw r.error});
 state.columns=cols.data||[]; state.profiles=prof.data||[]; state.tasks=tasks.data||[]; state.subtasks=subs.data||[]; state.comments=com.data||[]; state.attachments=att.data||[]; state.activity=act.data||[];}
function subscribeRealtime(){['tasks','subtasks','comments','attachments','activity_log'].forEach(tbl=>{sb.channel('rt_'+tbl).on('postgres_changes',{event:'*',schema:'public',table:tbl},async()=>{await loadData();renderAll(); if(state.selected){const fresh=state.tasks.find(t=>t.id===state.selected.id); if(fresh) openTask(fresh,true);}}).subscribe();});}
function setView(v){state.view=v;$$('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));renderAll()}
$$('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));
function taskProgress(task){const s=state.subtasks.filter(x=>x.task_id===task.id); if(!s.length) return task.is_done?100:0; return Math.round(s.filter(x=>x.is_done).length/s.length*100)}
function filteredTasks(){const q=$('#search').value.trim().toLowerCase(); if(!q) return state.tasks; return state.tasks.filter(t=>[t.title,t.description,t.tag,t.priority,profile(t.assignee_id)?.full_name].filter(Boolean).join(' ').toLowerCase().includes(q));}
function renderAll(){const c=$('#content'); if(!c) return; const v=state.view; if(v==='inicio') renderInicio(c); if(v==='tablero') renderBoard(c); if(v==='mis') renderMy(c); if(v==='equipo') renderTeam(c); if(v==='calendario') renderCalendar(c); if(v==='bandeja') renderInbox(c); if(v==='config') renderConfig(c);}
function renderInicio(c){const tasks=state.tasks, done=tasks.filter(t=>t.is_done).length, overdue=tasks.filter(t=>t.due_date&&!t.is_done&&new Date(t.due_date)<new Date()).length, pct=tasks.length?Math.round(done/tasks.length*100):0; c.innerHTML=`<div class="dashboard"><div class="panel-card"><h2>Resumen del proyecto</h2><p style="color:#667085">Identidad, publicaciones, organización familiar y seguimiento del evento.</p><div class="progress"><i style="width:${pct}%"></i></div><b>${pct}% completado</b><div class="cards" style="margin-top:14px"><div class="metric">Total<b>${tasks.length}</b></div><div class="metric">Finalizadas<b>${done}</b></div><div class="metric">En curso<b>${tasks.length-done}</b></div><div class="metric">Vencidas<b>${overdue}</b></div></div></div><div class="panel-card"><h2>Cuenta regresiva</h2><div id="countdown" class="countdown"></div><p style="color:#667085">para Navidad</p></div></div><h3>Objetivos 2026</h3><div class="cards"><div class="metric">Nuevo logo / marca <b style="font-size:18px">35%</b><div class="progress"><i style="width:35%"></i></div></div><div class="metric">Calendario de publicaciones <b style="font-size:18px">55%</b><div class="progress"><i style="width:55%"></i></div></div><div class="metric">80 Reels publicados <b style="font-size:18px">20%</b><div class="progress"><i style="width:20%"></i></div></div><div class="metric">Material anterior organizado <b style="font-size:18px">40%</b><div class="progress"><i style="width:40%"></i></div></div></div>`; updateCountdown()}
function updateCountdown(){const el=$('#countdown'); if(!el||!state.project?.target_date) return; const diff=new Date(state.project.target_date)-new Date(); const d=Math.max(0,Math.floor(diff/86400000)); const h=Math.max(0,Math.floor(diff/3600000)%24); const m=Math.max(0,Math.floor(diff/60000)%60); el.innerHTML=`Faltan<br>${d} días<br><span style="font-size:24px">${h} horas ${m} minutos</span>`} setInterval(updateCountdown,30000);
function renderBoard(c){c.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2>Tablero</h2><button class="create" onclick="openNewTask()">+ Agregar tarea</button></div><div class="board-wrap"><div class="board">${state.columns.map(col=>renderColumn(col)).join('')}</div></div>`; attachDnD()}
function renderColumn(col){const tasks=filteredTasks().filter(t=>t.column_id===col.id).sort((a,b)=>a.position-b.position); return `<div class="column" data-col="${col.id}"><div class="col-head"><span>${col.is_done?'✅ ':''}${col.name}</span><small>${tasks.length}</small></div><div class="dropzone">${tasks.map(renderTaskCard).join('')}</div><button class="add-task" onclick="openNewTask('${col.id}')">+ Agregar tarea</button></div>`}
function renderTaskCard(t){const p=profile(t.assignee_id); return `<div class="task ${t.is_done?'done':''}" draggable="true" data-task="${t.id}" onclick="openTaskById('${t.id}')"><i class="bar ${t.priority}"></i><div class="task-title">${t.is_done?'✓ ':''}${escapeHtml(t.title)}</div><div class="task-meta">${p?`<span class="avatar" style="background:${p.color}">${p.initials||p.full_name[0]}</span>`:'<span class="avatar" style="background:#94a3b8">?</span>'}<span>${t.priority}</span><span>${t.tag||''}</span><span>${taskProgress(t)}%</span></div></div>`}
function attachDnD(){let dragged=null; $$('.task').forEach(el=>{el.addEventListener('dragstart',e=>{dragged=el.dataset.task;el.classList.add('dragging');e.stopPropagation()});el.addEventListener('dragend',()=>el.classList.remove('dragging'))}); $$('.column').forEach(col=>{col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dragover')});col.addEventListener('dragleave',()=>col.classList.remove('dragover'));col.addEventListener('drop',async e=>{e.preventDefault();col.classList.remove('dragover');if(dragged) await moveTask(dragged,col.dataset.col)})})}
async function moveTask(taskId,colId){const col=state.columns.find(c=>c.id===colId); const {error}=await sb.from('tasks').update({column_id:colId,is_done:!!col.is_done,updated_at:new Date().toISOString()}).eq('id',taskId); if(error) return toast('Error al mover tarea'); await log('movió una tarea', state.tasks.find(t=>t.id===taskId)?.title); await loadData(); renderAll(); setTimeout(()=>{const el=document.querySelector(`[data-task="${taskId}"]`); if(el) el.classList.add('arrive')},30)}
function renderMy(c){const me=currentUser(); const tasks=filteredTasks().filter(t=>t.assignee_id===me?.id && !t.is_done); c.innerHTML=`<div class="panel-card"><h2>Mis tareas</h2>${tasks.length?tasks.map(t=>`<div class="row-task" onclick="openTaskById('${t.id}')"><b>${escapeHtml(t.title)}</b><br><small>${t.priority} · ${t.tag||''} ${t.due_date?'· '+t.due_date:''}</small></div>`).join(''):'<div class="empty">No tenés tareas pendientes asignadas.</div>'}</div>`}
function renderTeam(c){c.innerHTML=`<h2>Equipo</h2><div class="team-grid">${state.profiles.map(p=>{const ts=state.tasks.filter(t=>t.assignee_id===p.id);const done=ts.filter(t=>t.is_done).length;const pct=ts.length?Math.round(done/ts.length*100):0;return `<div class="member"><div class="member-head"><span class="avatar" style="background:${p.color};width:42px;height:42px">${p.initials||p.full_name[0]}</span><div><b>${p.full_name}</b><br><small>${p.role||''}</small></div></div><p><b>${ts.length}</b> tareas asignadas</p><div class="progress"><i style="width:${pct}%"></i></div><div class="member-list">${ts.length?ts.map(t=>`<div class="row-task" onclick="openTaskById('${t.id}')">${t.is_done?'✓':'○'} ${escapeHtml(t.title)}</div>`).join(''):'<small style="color:#667085">Sin tareas</small>'}</div></div>`}).join('')}</div>`}
function renderCalendar(c){const dated=filteredTasks().filter(t=>t.due_date).sort((a,b)=>a.due_date.localeCompare(b.due_date)); c.innerHTML=`<div class="panel-card"><h2>Calendario</h2>${dated.length?dated.map(t=>`<div class="row-task" onclick="openTaskById('${t.id}')"><b>${t.due_date}</b> — ${escapeHtml(t.title)}</div>`).join(''):'<div class="empty">No hay tareas con fecha tentativa.</div>'}</div>`}
function renderInbox(c){c.innerHTML=`<div class="panel-card"><h2>Bandeja</h2>${state.activity.length?state.activity.map(a=>`<div class="row-task"><b>${profile(a.profile_id)?.full_name||'Sistema'}</b> ${a.action}<br><small>${a.detail||''} · ${new Date(a.created_at).toLocaleString()}</small></div>`).join(''):'<div class="empty">Todavía no hay actividad.</div>'}</div>`}
function renderConfig(c){c.innerHTML=`<div class="panel-card"><h2>Configuración</h2><p>Conexión activa a Supabase.</p><p><b>Proyecto:</b> ${state.project?.name||''}</p><p><b>Tablas conectadas:</b> projects, board_columns, profiles, tasks, subtasks, comments, attachments, activity_log.</p></div>`}
function openNewTask(colId){const col=colId||state.columns[0]?.id; const t={id:null,title:'Nueva tarea',description:'',column_id:col,assignee_id:currentUser()?.id,priority:'Media',tag:'',due_date:null,is_done:false}; openTask(t,true)}
function openTaskById(id){const t=state.tasks.find(x=>x.id===id); if(t) openTask(t)}
function openTask(t,noLog){state.selected={...t}; $('#backdrop').classList.add('open'); $('#drawer').classList.add('open'); $('#taskTitle').value=t.title; $('#taskTitle').onchange=()=>saveTaskField('title',$('#taskTitle').value); renderDrawer();}
function closeDrawer(){state.selected=null; $('#backdrop').classList.remove('open'); $('#drawer').classList.remove('open')}
function renderDrawer(){const t=state.selected; const isNew=!t.id; const subs=state.subtasks.filter(s=>s.task_id===t.id); const done=subs.filter(s=>s.is_done).length; const comm=state.comments.filter(x=>x.task_id===t.id); const att=state.attachments.filter(x=>x.task_id===t.id); $('#drawerBody').innerHTML=`${isNew?'<button class="create" onclick="createSelectedTask()">Crear tarea en Supabase</button><br><br>':''}<div class="two"><div class="field"><label>Estado</label><select onchange="saveTaskField('column_id',this.value)">${state.columns.map(c=>`<option value="${c.id}" ${c.id===t.column_id?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="field"><label>Responsable</label><select onchange="saveTaskField('assignee_id',this.value)">${state.profiles.map(p=>`<option value="${p.id}" ${p.id===t.assignee_id?'selected':''}>${p.full_name}</option>`).join('')}</select></div></div><div class="two"><div class="field"><label>Prioridad</label><select onchange="saveTaskField('priority',this.value)">${['Baja','Media','Alta','Urgente'].map(x=>`<option ${x===t.priority?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Fecha tentativa de cierre</label><input type="date" value="${t.due_date||''}" onchange="saveTaskField('due_date',this.value||null)"></div></div><div class="field"><label>Etiqueta</label><input value="${escapeAttr(t.tag||'')}" onchange="saveTaskField('tag',this.value)"></div><div class="field"><label>Descripción</label><textarea onchange="saveTaskField('description',this.value)">${escapeHtml(t.description||'')}</textarea></div><div class="subhead">Subtareas <span style="background:#eef0f3;padding:2px 6px;border-radius:6px">${done}/${subs.length}</span> <button onclick="addSubtask()">+</button></div>${t.id?subs.map(renderSub).join(''):'<p style="color:#667085">Primero creá la tarea para agregar subtareas.</p>'}<div class="subhead">Adjuntos por enlace <button onclick="addAttachmentPrompt()">+</button></div>${att.map(a=>`<div class="row-task"><a href="${a.file_url}" target="_blank">📎 ${escapeHtml(a.name)}</a></div>`).join('')||'<p style="color:#667085">Sin adjuntos.</p>'}<div class="subhead">Comentarios</div>${t.id?`<div class="field"><textarea id="newComment" placeholder="Agregar comentario..."></textarea><button class="create" onclick="addComment()">Comentar</button></div>`:''}${comm.map(c=>`<div class="comment"><b>${profile(c.profile_id)?.full_name||'Usuario'}</b><small>${new Date(c.created_at).toLocaleString()}</small><p>${escapeHtml(c.body)}</p></div>`).join('')}`}
function renderSub(s){return `<div class="subitem ${s.is_done?'done':''}"><button class="check ${s.is_done?'done':''}" onclick="toggleSubtask('${s.id}')">${s.is_done?'✓':''}</button><input value="${escapeAttr(s.title)}" onchange="updateSubtask('${s.id}','title',this.value)"><select onchange="updateSubtask('${s.id}','assignee_id',this.value)"><option value="">Sin responsable</option>${state.profiles.map(p=>`<option value="${p.id}" ${p.id===s.assignee_id?'selected':''}>${p.full_name}</option>`).join('')}</select><input type="date" value="${s.due_date||''}" onchange="updateSubtask('${s.id}','due_date',this.value||null)"><button onclick="deleteSubtask('${s.id}')">×</button></div>`}
async function createSelectedTask(){const t=state.selected; const {data,error}=await sb.from('tasks').insert({project_id:state.project.id,column_id:t.column_id,title:$('#taskTitle').value||'Nueva tarea',description:t.description||'',assignee_id:t.assignee_id,priority:t.priority||'Media',tag:t.tag||'',due_date:t.due_date||null,position:Date.now(),created_by:currentUser()?.id}).select().single(); if(error) return toast('Error al crear tarea'); state.selected=data; await log('creó una tarea',data.title,data.id); await loadData(); renderAll(); openTask(data,true); toast('Tarea creada')}
async function saveTaskField(field,value){let t=state.selected; if(!t) return; if(field==='column_id'){const col=state.columns.find(c=>c.id===value); t.is_done=!!col?.is_done; if(t.id) await sb.from('tasks').update({column_id:value,is_done:t.is_done}).eq('id',t.id); t.column_id=value;} else {t[field]=value; if(t.id){const {error}=await sb.from('tasks').update({[field]:value}).eq('id',t.id); if(error) return toast('Error al guardar')}} if(t.id){await loadData(); renderAll(); state.selected=state.tasks.find(x=>x.id===t.id)||t; renderDrawer();}}
async function addSubtask(){const t=state.selected; if(!t?.id) return; const title=prompt('Nueva subtarea'); if(!title) return; await sb.from('subtasks').insert({task_id:t.id,title,position:Date.now()}); await log('agregó una subtarea',title,t.id); await loadData(); renderAll(); openTaskById(t.id)}
async function updateSubtask(id,field,value){await sb.from('subtasks').update({[field]:value}).eq('id',id); await loadData(); renderAll(); openTaskById(state.selected.id)}
async function toggleSubtask(id){const s=state.subtasks.find(x=>x.id===id); await sb.from('subtasks').update({is_done:!s.is_done}).eq('id',id); await log(!s.is_done?'finalizó una subtarea':'reabrió una subtarea',s.title,state.selected.id); await loadData(); renderAll(); const fresh=state.tasks.find(x=>x.id===state.selected.id); if(fresh) openTask(fresh,true)}
async function deleteSubtask(id){await sb.from('subtasks').delete().eq('id',id); await loadData(); renderAll(); openTaskById(state.selected.id)}
async function addComment(){const body=$('#newComment').value.trim(); if(!body) return; await sb.from('comments').insert({task_id:state.selected.id,profile_id:currentUser()?.id,body}); await log('comentó una tarea',body,state.selected.id); await loadData(); renderAll(); openTaskById(state.selected.id)}
async function addAttachmentPrompt(){const url=prompt('Pegá el enlace del archivo'); if(!url) return; const name=prompt('Nombre del adjunto')||url.split('/').pop()||'Adjunto'; await sb.from('attachments').insert({task_id:state.selected.id,name,file_url:url,created_by:currentUser()?.id}); await log('agregó un adjunto',name,state.selected.id); await loadData(); renderAll(); openTaskById(state.selected.id)}
async function log(action,detail,taskId){try{await sb.from('activity_log').insert({project_id:state.project.id,task_id:taskId||null,profile_id:currentUser()?.id,action,detail})}catch(e){}}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))} function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}
init();
</script>
</body>
</html>
